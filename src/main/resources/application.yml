  # 3. Create an App Password (select "Mail" and "Other")
  # 4. Paste the 16-char app password below (no spaces)
  mail:
    username: ${MAIL_USERNAME:visalsoeurn9@gmail.com}
    password: ${MAIL_PASSWORD:}
  jpa:
    show-sql: true

logging:
  level:
    com.coffee.app:               DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL:            DEBUG
    org.hibernate.orm.jdbc.bind:  TRACE

---
spring:
  config:
    activate:
      on-profile: docker
  main:
    lazy-initialization: true
  data:
    jpa:
      repositories:
        bootstrap-mode: deferred
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/coffee_shop_db}
    username: ${SPRING_DATASOURCE_USERNAME:coffeeshop}
    password: ${SPRING_DATASOURCE_PASSWORD:coffeeshop@168}
  mail:
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
  jpa:
    show-sql: false

logging:
  level:
    com.coffee.app:               INFO
    org.springframework.security: INFO
    org.hibernate.SQL:            WARN
    org.hibernate.orm.jdbc.bind:  WARN



