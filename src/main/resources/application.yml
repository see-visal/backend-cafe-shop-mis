    activate:
      on-profile: local
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/coffee_shop_db}
    username: ${SPRING_DATASOURCE_USERNAME:coffeeshop}
    password: ${SPRING_DATASOURCE_PASSWORD:coffeeshop@168}

  # ── Gmail SMTP for password-reset OTP emails ──────────────────────────────
