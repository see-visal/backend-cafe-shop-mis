spring:
  application:
    name: coffee-shop-backend
  profiles:
    default: local

  jackson:
    time-zone: Asia/Phnom_Penh
    serialization:
      write-dates-as-timestamps: false

  # ── File Upload ───────────────────────────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      resolve-lazily: false

  # ── DataSource (configured per profile) ───────────────────────────────────────
  datasource:
    driver-class-name: org.postgresql.Driver

  # ── JPA / Hibernate ───────────────────────────────────────────────────────────
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update        # Auto-create/update tables from entities (no Flyway needed)
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  # ── Migration tool — Flyway or Liquibase to manage schema changes safely
  # ── Flyway — disabled, Hibernate manages schema ───────────────────────────────
  flyway:
    enabled: false

  # ── Email / SMTP (Gmail App Password) ────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

# ── MinIO Configuration ────────────────────────────────────────────────────────────
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET_NAME:coffeeshop-files}

# ── Server ────────────────────────────────────────────────────────────────────
server:
  address: 0.0.0.0
  port: ${PORT:8080}

# ── Swagger / SpringDoc OpenAPI ────────────────────────────────────────────────
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls-primary-name: "Coffee Shop API"
  api-docs:
    enabled: true
    path: /v3/api-docs
  show-actuator: false

# ── App-level CORS ────────────────────────────────────────────────────────────
app:
  cors:
    allowed-origins:   ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost:5174}
    allowed-methods:   GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers:   "*"
    exposed-headers:   Authorization,X-Total-Count,Content-Type
    allow-credentials: true
    max-age:           3600

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.coffee.app:               INFO
    org.springframework.security: INFO
    org.hibernate.SQL:            WARN
    org.hibernate.orm.jdbc.bind:  WARN

# ── Stripe (optional; leave unset to disable card payment) ─────────────────────
stripe:
  api-key: ${STRIPE_API_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

notifications:
  from-email: ${NOTIFICATIONS_FROM_EMAIL:${MAIL_USERNAME:noreply@salseecoffee.com}}
  admin-email: ${ADMIN_NOTIFICATION_EMAIL:${MAIL_USERNAME:admin@salseecoffee.com}}

